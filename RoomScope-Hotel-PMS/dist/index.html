<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RoomScope PMS</title>
  <meta name="description" content="ระบบบริหารจัดการโรงแรม RoomScope — ครบวงจร ทันสมัย เชื่อมต่อ LINE">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #21262d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --accent: #58a6ff;
  --accent-grad: linear-gradient(135deg, #8957e5 0%, #58a6ff 100%);
  --success: #3fb950;
  --warning: #d29922;
  --danger: #f85149;
  --card-shadow: 0 8px 24px rgba(0,0,0,0.4);
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex;
}
#sidebar {
  width: 220px; min-height: 100vh;
  background: var(--surface); border-right: 1px solid var(--border);
  padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 0.5rem;
}
#sidebar .logo {
  font-size: 1.2rem; font-weight: 700;
  background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 1.5rem; padding: 0 0.5rem;
}
.nav-item {
  padding: 0.7rem 1rem; border-radius: 8px; cursor: pointer;
  color: var(--text-muted); font-size: 0.9rem;
  transition: all 0.2s; display: flex; align-items: center; gap: 0.6rem;
}
.nav-item:hover, .nav-item.active { background: rgba(88,166,255,0.12); color: var(--text); }
.sub-tab { padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; color: var(--text-muted); }
.sub-tab:hover, .sub-tab.active { background: rgba(88,166,255,0.15); color: var(--text); }
#main { flex: 1; padding: 2rem; overflow-y: auto; }
.page-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; }
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--card-shadow);
}
.card-title { font-size: 1rem; font-weight: 600; color: var(--text-muted); margin-bottom: 1rem; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.kpi-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.2rem; text-align: center;
}
.kpi-value { font-size: 2rem; font-weight: 700; }
.kpi-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3rem; }
.kpi-card.available .kpi-value { color: var(--success); }
.kpi-card.occupied .kpi-value { color: var(--accent); }
.kpi-card.dirty .kpi-value { color: var(--warning); }
.kpi-card.oor .kpi-value { color: var(--danger); }
.btn {
  padding: 0.65rem 1.2rem; border-radius: 8px; border: none;
  font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
  display: inline-flex; align-items: center; gap: 0.4rem; color: #fff;
}
.btn-primary { background: var(--accent-grad); box-shadow: 0 4px 12px rgba(88,166,255,0.3); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(88,166,255,0.4); }
.btn-success { background: linear-gradient(135deg, #26a641, #3fb950); }
.btn-danger { background: linear-gradient(135deg, #b91c1c, #f85149); }
.btn-ghost { background: rgba(255,255,255,0.06); border: 1px solid var(--border); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
th { text-align: left; padding: 0.75rem 1rem; color: var(--text-muted); font-weight: 500;
  border-bottom: 1px solid var(--border); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); }
tr:hover td { background: rgba(255,255,255,0.02); }
.badge {
  padding: 0.25rem 0.65rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; display: inline-block;
}
.badge-available { background: rgba(63,185,80,0.15); color: var(--success); }
.badge-occupied { background: rgba(88,166,255,0.15); color: var(--accent); }
.badge-dirty { background: rgba(210,153,34,0.15); color: var(--warning); }
.badge-oor { background: rgba(248,81,73,0.15); color: var(--danger); }
.badge-confirmed { background: rgba(88,166,255,0.15); color: var(--accent); }
.badge-checked_in { background: rgba(63,185,80,0.15); color: var(--success); }
.badge-checked_out { background: rgba(139,148,158,0.15); color: var(--text-muted); }
.badge-pending { background: rgba(210,153,34,0.15); color: var(--warning); }
.form-group { margin-bottom: 1rem; }
.form-label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.4rem; display: block; }
.form-input {
  width: 100%; padding: 0.65rem 0.9rem; background: var(--bg);
  border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9rem;
}
.form-input:focus, .form-select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88,166,255,0.15); }
.form-select {
  width: 100%; padding: 0.65rem 0.9rem; background: var(--bg);
  border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9rem;
}
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 1000; align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 2rem; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto;
}
.modal-header { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; justify-content: space-between; }
.alert { padding: 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; }
.alert-error { background: rgba(248,81,73,0.12); border: 1px solid rgba(248,81,73,0.3); color: #f85149; }
.alert-success { background: rgba(63,185,80,0.12); border: 1px solid rgba(63,185,80,0.3); color: #3fb950; }
#login-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center; z-index: 9999;
}
.login-card { width: 380px; }
.login-card h1 { font-size: 1.8rem; font-weight: 700; background: var(--accent-grad);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.4rem; text-align: center; }
.login-card .subtitle { color: var(--text-muted); text-align: center; margin-bottom: 2rem; font-size: 0.9rem; }
@media (max-width: 768px) {
  #sidebar { display: none; }
  #sidebar.open { display: flex; position: fixed; z-index: 999; width: 240px; height: 100vh; }
}
</style>

</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="card login-card">
    <div style="font-size:3rem;margin-bottom:.5rem">🏨</div>
    <h1>RoomScope</h1>
    <p class="subtitle">Hotel Property Management System</p>
    <div id="login-error" class="alert alert-error" style="display:none"></div>
    <div class="form-group">
      <label class="form-label" for="login-username">ชื่อผู้ใช้</label>
      <input id="login-username" class="form-input" type="text" placeholder="กรอกชื่อผู้ใช้"
        onkeydown="if(event.key==='Enter') document.getElementById('login-password').focus()">
    </div>
    <div class="form-group">
      <label class="form-label" for="login-password">รหัสผ่าน</label>
      <input id="login-password" class="form-input" type="password" placeholder="กรอกรหัสผ่าน"
        onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button id="btn-login" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem" onclick="doLogin()">
      เข้าสู่ระบบ
    </button>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar" style="display:none">
  <div class="logo">🏨 RoomScope</div>
  <div class="nav-item active" data-page="dashboard" onclick="loadPage('dashboard')">📊 แดชบอร์ด</div>
  <div class="nav-item" data-page="rooms" onclick="loadPage('rooms')">🏨 ห้องพัก</div>
  <div class="nav-item" data-page="bookings" onclick="loadPage('bookings')">📅 การจอง</div>
  <div class="nav-item" data-page="housekeeping" onclick="loadPage('housekeeping')">🧹 ทำความสะอาด</div>
  <div class="nav-item" data-page="financial_docs" onclick="loadPage('financial_docs')">🧾 เอกสารการเงิน</div>
  <div class="nav-item" data-page="legal_logs" onclick="loadPage('legal_logs')">📋 รายงานกฎหมาย</div>
  <div class="nav-item admin-only" data-page="reports" onclick="loadPage('reports')" style="display:none">📈 รายงาน</div>
  <div class="nav-item admin-only" data-page="settings" onclick="loadPage('settings')" style="display:none">⚙️ ตั้งค่าระบบ</div>
  <div style="flex:1"></div>
  <div class="user-info" id="user-name" style="padding:.75rem 1rem;font-size:.85rem;color:var(--text-muted);border-top:1px solid var(--border)"></div>
  <div class="nav-item" onclick="doLogout()" style="color:var(--danger)">🚪 ออกจากระบบ</div>
</div>

<!-- MAIN -->
<div id="main" style="display:none">
  <div id="page-content"></div>
</div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center" onclick="if(event.target===this)closeModal()">
  <div class="card" id="modal-body" style="max-width:500px;width:90%;max-height:90vh;overflow-y:auto"></div>
</div>

<script>
// ===== STATE =====
var STATE = { token: null, role: null, fullName: null, currentPage: 'dashboard' };

// ===== INIT =====
window.onload = function() {
  var savedToken = localStorage.getItem('pms_token');
  if (savedToken) {
    STATE.token = savedToken;
    STATE.role = localStorage.getItem('pms_role');
    STATE.fullName = localStorage.getItem('pms_name');
    hidePage('login-screen');
    showApp();
    loadPage('dashboard');
  }
};

// ===== AUTH =====
function doLogin() {
  var u = document.getElementById('login-username').value.trim();
  var p = document.getElementById('login-password').value;
  var btn = document.getElementById('btn-login');
  if (!u || !p) return showLoginError('กรุณากรอกชื่อผู้ใช้และรหัสผ่าน');
  btn.disabled = true; btn.textContent = 'กำลังเข้าสู่ระบบ...';
  google.script.run
    .withSuccessHandler(function(res) {
      STATE.token = res.token; STATE.role = res.role; STATE.fullName = res.fullName;
      localStorage.setItem('pms_token', res.token);
      localStorage.setItem('pms_role', res.role);
      localStorage.setItem('pms_name', res.fullName);
      hidePage('login-screen');
      showApp();
      loadPage('dashboard');
      btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ';
    })
    .withFailureHandler(function(e) {
      showLoginError(e.message); btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ';
    })
    .เข้าสู่ระบบ(u, p);
}

function doLogout() {
  try { google.script.run.ออกจากระบบ(STATE.token); } catch(e) {}
  STATE = { token: null, role: null, fullName: null, currentPage: 'dashboard' };
  localStorage.clear();
  document.getElementById('sidebar').style.display = 'none';
  document.getElementById('main').style.display = 'none';
  showPage('login-screen');
}

function showApp() {
  document.getElementById('sidebar').style.display = 'flex';
  document.getElementById('main').style.display = 'flex';
  document.getElementById('user-name').textContent = STATE.fullName || '';
  // Show admin-only menus
  if (STATE.role === 'SuperAdmin' || STATE.role === 'Manager') {
    document.querySelectorAll('.admin-only').forEach(function(el) { el.style.display = 'flex'; });
  }
}

function showLoginError(msg) {
  var el = document.getElementById('login-error');
  el.textContent = msg; el.style.display = 'block';
}

// ===== NAVIGATION =====
function loadPage(page) {
  STATE.currentPage = page;
  document.querySelectorAll('.nav-item[data-page]').forEach(function(el) {
    el.classList.toggle('active', el.dataset.page === page);
  });
  var content = document.getElementById('page-content');
  content.innerHTML = '<div class="loading-spinner">⏳ กำลังโหลด...</div>';
  if (page === 'dashboard') renderDashboard();
  else if (page === 'rooms') renderRooms();
  else if (page === 'bookings') renderBookings();
  else if (page === 'housekeeping') renderHousekeeping();
  else if (page === 'financial_docs') renderFinancialDocs();
  else if (page === 'legal_logs') renderLegalLogs();
  else if (page === 'reports') renderReports();
  else if (page === 'settings') renderSettings();
}

// ===== DASHBOARD =====
function renderDashboard() {
  google.script.run
    .withSuccessHandler(function(data) {
      document.getElementById('page-content').innerHTML =
        '<h1 class="page-title">📊 แดชบอร์ด</h1>' +
        '<div class="kpi-grid">' +
          '<div class="kpi-card available"><div class="kpi-value">' + (data.roomStats.available||0) + '</div><div class="kpi-label">ห้องว่าง</div></div>' +
          '<div class="kpi-card occupied"><div class="kpi-value">' + (data.roomStats.occupied||0) + '</div><div class="kpi-label">มีผู้เข้าพัก</div></div>' +
          '<div class="kpi-card dirty"><div class="kpi-value">' + ((data.roomStats.dirty||0)+(data.roomStats.clean_inspected||0)) + '</div><div class="kpi-label">งานทำความสะอาด</div></div>' +
          '<div class="kpi-card oor"><div class="kpi-value">' + (data.roomStats.out_of_order||0) + '</div><div class="kpi-label">ปิดซ่อม</div></div>' +
        '</div>' +
        '<div class="kpi-grid">' +
          '<div class="kpi-card"><div class="kpi-value" style="color:var(--accent)">' + data.occupancyRate + '%</div><div class="kpi-label">Occupancy Rate</div></div>' +
          '<div class="kpi-card"><div class="kpi-value" style="color:var(--success)">' + data.todayCheckIns + '</div><div class="kpi-label">เช็คอินวันนี้</div></div>' +
          '<div class="kpi-card"><div class="kpi-value" style="color:var(--warning)">' + data.todayCheckOuts + '</div><div class="kpi-label">เช็คเอาท์วันนี้</div></div>' +
          '<div class="kpi-card"><div class="kpi-value" style="color:var(--accent)">' + fmtMoney(data.todayRevenue||0) + '</div><div class="kpi-label">รายรับวันนี้ (฿)</div></div>' +
        '</div>';
    })
    .withFailureHandler(handleError)
    .ดึงข้อมูลDashboard(STATE.token);
}

// ===== ROOMS =====
function renderRooms() {
  google.script.run
    .withSuccessHandler(function(rooms) {
      var rows = rooms.map(function(r) {
        var statusLabel = {available:'ว่าง',occupied:'มีผู้เข้าพัก',dirty:'รอทำความสะอาด',clean_inspected:'สะอาดพร้อมขาย',out_of_order:'ปิดซ่อม'}[r.status]||r.status;
        var badgeClass = 'badge-' + (r.status==='clean_inspected'?'available':r.status==='out_of_order'?'oor':r.status);
        return '<tr>' +
          '<td><strong>' + r.roomNo + '</strong></td>' +
          '<td>' + r.buildingName + '</td>' +
          '<td>' + r.roomTypeName + '</td>' +
          '<td>' + fmtMoney(r.priceDaily) + ' ฿</td>' +
          '<td><span class="badge ' + badgeClass + '">' + statusLabel + '</span></td>' +
          '<td>' +
            (r.status !== 'occupied' && r.status !== 'out_of_order' ?
              '<button class="btn btn-sm btn-primary" onclick="showBookingModal(\'' + r.roomId + '\',\'' + r.roomNo + '\')">จอง</button>' : '') +
          '</td>' +
        '</tr>';
      }).join('');
      document.getElementById('page-content').innerHTML =
        '<h1 class="page-title">🏨 ห้องพักทั้งหมด</h1>' +
        '<div class="card"><table><thead><tr><th>เลขห้อง</th><th>อาคาร</th><th>ประเภท</th><th>ราคา/คืน</th><th>สถานะ</th><th>ดำเนินการ</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
    })
    .withFailureHandler(handleError)
    .ดึงข้อมูลห้องพักทั้งหมด(STATE.token);
}

// ===== BOOKINGS =====
function renderBookings() {
  google.script.run
    .withSuccessHandler(function(bookings) {
      var statusLabel = {confirmed:'ยืนยันแล้ว',pending:'รอยืนยัน',checked_in:'เช็คอินแล้ว',checked_out:'เช็คเอาท์แล้ว',cancelled:'ยกเลิก'};
      var rows = bookings.map(function(b) {
        var sc = b.status==='checked_in'?'badge-occupied':b.status==='confirmed'?'badge-available':b.status==='cancelled'?'badge-oor':'badge-dirty';
        var actions = '<div style="display:flex;flex-wrap:wrap;gap:0.3rem">';
        if (b.status==='confirmed') actions += '<button class="btn btn-sm btn-primary" onclick="doCheckIn(\'' + b.bookingId + '\')">เช็คอิน</button>';
        if (b.status==='checked_in') actions += '<button class="btn btn-sm btn-success" onclick="doCheckOut(\'' + b.bookingId + '\')">เช็คเอาท์</button>';
        if (b.status==='confirmed'||b.status==='pending') actions += '<button class="btn btn-sm" style="background:var(--danger)" onclick="doCancelBooking(\'' + b.bookingId + '\')">ยกเลิก</button>';
        actions += '</div>';
        
        var advActions = '<div style="display:flex;gap:0.3rem;margin-top:0.3rem">' +
          '<button class="btn btn-sm btn-ghost" style="padding:0.25rem 0.5rem;font-size:0.75rem" onclick="showAddonsModal(\'' + b.bookingId + '\',\'' + b.roomNo + '\')">➕ แอดออน</button>' +
          '<button class="btn btn-sm btn-ghost" style="padding:0.25rem 0.5rem;font-size:0.75rem" onclick="showIssueDocModal(\'' + b.bookingId + '\',' + b.totalAmount + ')">🧾 เอกสาร</button>' +
          '<button class="btn btn-sm btn-ghost" style="padding:0.25rem 0.5rem;font-size:0.75rem" onclick="showLegalGuestModal(\'' + b.bookingId + '\',\'' + b.roomNo + '\',\'' + b.guestName.replace(/'/g, "\\'") + '\')">📋 ตม.</button>' +
          '</div>';

        return '<tr>' +
          '<td><strong>' + b.bookingId + '</strong></td>' +
          '<td>' + b.guestName + '</td>' +
          '<td>' + b.roomNo + '</td>' +
          '<td>' + b.checkInDate + '</td>' +
          '<td>' + b.checkOutDate + '</td>' +
          '<td>' + b.nights + ' คืน</td>' +
          '<td>' + fmtMoney(b.totalAmount) + ' ฿</td>' +
          '<td><span class="badge ' + sc + '">' + (statusLabel[b.status]||b.status) + '</span></td>' +
          '<td>' + actions + advActions + '</td>' +
          '</tr>';
      }).join('');
      document.getElementById('page-content').innerHTML =
        '<h1 class="page-title">📅 การจองทั้งหมด</h1>' +
        '<div style="margin-bottom:1rem"><button class="btn btn-primary" onclick="showNewBookingForm()">➕ สร้างการจองใหม่</button></div>' +
        '<div class="card"><table><thead><tr>' +
          '<th>Booking ID</th><th>ผู้เข้าพัก</th><th>ห้อง</th><th>เช็คอิน</th><th>เช็คเอาท์</th><th>คืน</th><th>ยอดรวม</th><th>สถานะ</th><th>ดำเนินการ</th>' +
        '</tr></thead><tbody>' + rows + '</tbody></table></div>';
    })
    .withFailureHandler(handleError)
    .ดึงการจองทั้งหมด(STATE.token);
}

function doCheckIn(bookingId) {
  if (!confirm('ยืนยันการเช็คอิน Booking: ' + bookingId + '?')) return;
  google.script.run.withSuccessHandler(function() { loadPage('bookings'); }).withFailureHandler(handleError).เช็คอิน(STATE.token, bookingId);
}
function doCheckOut(bookingId) {
  if (!confirm('ยืนยันการเช็คเอาท์ Booking: ' + bookingId + '?')) return;
  google.script.run.withSuccessHandler(function() { loadPage('bookings'); }).withFailureHandler(handleError).เช็คเอาท์(STATE.token, bookingId);
}
function doCancelBooking(bookingId) {
  var reason = prompt('ระบุเหตุผลการยกเลิก:');
  if (reason === null) return;
  google.script.run.withSuccessHandler(function() { loadPage('bookings'); }).withFailureHandler(handleError).ยกเลิกการจอง(STATE.token, bookingId, reason);
}

function showNewBookingForm() {
  var modal = document.getElementById('modal');
  var body = document.getElementById('modal-body');
  var today = new Date().toISOString().slice(0,10);
  var tomorrow = new Date(Date.now()+86400000).toISOString().slice(0,10);
  body.innerHTML =
    '<h2 style="margin-bottom:1.5rem">📝 สร้างการจองใหม่</h2>' +
    '<div class="form-group"><label class="form-label">ชื่อผู้เข้าพัก</label><input id="bk-name" class="form-input" placeholder="ชื่อ-นามสกุล"></div>' +
    '<div class="form-group" style="display:flex;gap:1rem">' +
      '<div style="flex:1"><label class="form-label">เบอร์โทร</label><input id="bk-phone" class="form-input" placeholder="0812345678"></div>' +

function submitNewBooking() {
  var data = {

    email: document.getElementById('bk-email').value.trim(),
    idCard: document.getElementById('bk-idcard').value.trim(),

    checkOutDate: document.getElementById('bk-cout').value,

  };
  if (!data.guestName || !data.roomNo || !data.checkInDate || !data.checkOutDate) {

function showBookingModal(roomId, roomNo) {
  showNewBookingForm();
  setTimeout(function() {
    var el = document.getElementById('bk-room');
    if (el) { el.value = roomNo; el.readOnly = true; }
    calculateBookingPricePreview();
  }, 100);
}

function calculateBookingPricePreview() {
  var roomNo = document.getElementById('bk-room').value.trim();
  var cin = document.getElementById('bk-cin').value;
  var cout = document.getElementById('bk-cout').value;
  var coupon = document.getElementById('bk-coupon').value.trim();
  var previewEl = document.getElementById('booking-price-preview');
  
  if (!roomNo || !cin || !cout) return;
  
  previewEl.style.display = 'block';
  previewEl.innerHTML = '⏳ กำลังคำนวณราคา...';
  
  google.script.run
    .withSuccessHandler(function(res) {
      var breakdown = res.roomChargeBreakdown.map(function(d) {
        return '<div>📅 ' + d.date + ' : ' + fmtMoney(d.rate) + ' ฿ (' + d.season + ')</div>';
      }).join('');
      
      var discountText = '';
      if (res.couponApplied) {
        discountText = '<div style="color:var(--success);font-weight:600">ส่วนลดคูปอง (' + res.couponCode + '): -' + fmtMoney(res.couponDiscount) + ' ฿</div>';
      }
      
      previewEl.innerHTML = 
        '<div style="font-weight:600;margin-bottom:0.5rem;color:var(--accent)">📋 รายละเอียดราคา (' + res.totalNights + ' คืน)</div>' +
        '<div style="display:flex;flex-direction:column;gap:0.25rem;margin-bottom:0.5rem">' + breakdown + '</div>' +
        discountText +
        '<div style="border-top:1px solid var(--border);padding-top:0.5rem;margin-top:0.5rem;display:flex;justify-content:space-between;font-weight:700;font-size:1rem">' +
          '<span>ยอดรวมสุทธิ:</span>' +
          '<span style="color:var(--success)">' + fmtMoney(res.totalAmount) + ' ฿</span>' +
        '</div>';
    })
    .withFailureHandler(function(e) {
      previewEl.innerHTML = '<span style="color:var(--danger)">❌ ไม่สามารถคำนวณราคาได้: ' + e.message + '</span>';
    })
    .คำนวณราคาสมบูรณ์จากเลขห้อง(STATE.token, roomNo, cin, cout, coupon);
}

// ===== HOUSEKEEPING =====
function renderHousekeeping() {
  google.script.run
    .withSuccessHandler(function(tasks) {
      var statusLabel = {pending:'รอดำเนินการ',in_progress:'กำลังทำ',done:'เสร็จแล้ว',inspected:'ตรวจแล้ว'};
      var rows = tasks.map(function(t) {
        var sc = t.status==='done'||t.status==='inspected'?'badge-available':t.status==='in_progress'?'badge-dirty':'badge-oor';
        var actions = '';
        if (t.status==='pending') actions = '<button class="btn btn-sm btn-primary" onclick="startTask(\'' + t.taskId + '\')">เริ่มทำ</button>';
        else if (t.status==='in_progress') actions = '<button class="btn btn-sm btn-success" onclick="doneTask(\'' + t.taskId + '\')">เสร็จสิ้น</button>';
        else if (t.status==='done') actions = '<button class="btn btn-sm" style="background:var(--accent)" onclick="inspectTask(\'' + t.taskId + '\')">ตรวจรับ</button>';
        return '<tr><td>' + t.roomNo + '</td><td>' + (t.taskType||'-') + '</td><td><span class="badge ' + sc + '">' + (statusLabel[t.status]||t.status) + '</span></td><td>' + (t.assignedToName||'-') + '</td><td>' + actions + '</td></tr>';
      }).join('');
      document.getElementById('page-content').innerHTML =
        '<h1 class="page-title">🧹 งานทำความสะอาด</h1>' +
        '<div class="card"><table><thead><tr><th>ห้อง</th><th>ประเภทงาน</th><th>สถานะ</th><th>ผู้รับผิดชอบ</th><th>ดำเนินการ</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
    })
    .withFailureHandler(handleError)
    .ดึงงานทำความสะอาดทั้งหมด(STATE.token);
}

function startTask(id) { google.script.run.withSuccessHandler(function(){loadPage('housekeeping');}).withFailureHandler(handleError).เริ่มงานทำความสะอาด(STATE.token,id); }
function doneTask(id) { google.script.run.withSuccessHandler(function(){loadPage('housekeeping');}).withFailureHandler(handleError).เสร็จงานทำความสะอาด(STATE.token,id); }
function inspectTask(id) { google.script.run.withSuccessHandler(function(){loadPage('housekeeping');}).withFailureHandler(handleError).ตรวจรับงานทำความสะอาด(STATE.token,id); }

function updateAddonTemplatePrice() {
  var select = document.getElementById('ad-template-select');
  var selected = select.options[select.selectedIndex];
  if (select.value === '') {
    document.getElementById('ad-name').value = '';
    document.getElementById('ad-price').value = '0';
  } else {
    document.getElementById('ad-name').value = selected.getAttribute('data-name');
    document.getElementById('ad-price').value = selected.getAttribute('data-price');
  }
}

function addBookingAddon(bookingId, roomNo) {
  var data = {
    AddonName: document.getElementById('ad-name').value.trim(),
    UnitPrice: parseFloat(document.getElementById('ad-price').value) || 0,
    Qty: parseInt(document.getElementById('ad-qty').value) || 1,
    Notes: document.getElementById('ad-notes').value.trim()
  };
  if (!data.AddonName) return alert('กรุณาระบุชื่อบริการ');
  google.script.run
    .withSuccessHandler(function() { showAddonsModal(bookingId, roomNo); })
    .withFailureHandler(function(e) { alert('❌ ' + e.message); })
    .เพิ่มแอดออนการจอง(STATE.token, bookingId, data);
}

function deleteBookingAddon(id, bookingId, roomNo) {
  if (!confirm('ต้องการลบรายการนี้ใช่หรือไม่?')) return;
  google.script.run
    .withSuccessHandler(function() { showAddonsModal(bookingId, roomNo); })
    .withFailureHandler(function(e) { alert('❌ ' + e.message); })
    .ลบแอดออนการจอง(STATE.token, id, bookingId);
}

  updates[field] = value;
  google.script.run
    .withSuccessHandler(function() { 
      if (STATE.currentPage === 'legal_logs') {
        filterLegalLogs();
      } else {
        loadPage(STATE.currentPage);
      }
    })
    .withFailureHandler(handleError)
    .อัปเดตสถานะผู้เข้าพักตามกฎหมาย(STATE.token, id, updates);
}

function showLegalGuestModal(bookingId, roomNo, guestName, id) {
  var modal = document.getElementById('modal');

  modal.style.display = 'flex';
  body.innerHTML = '⏳ กำลังประมวลผลฟอร์ม...';
  
  var title = id ? '📝 แก้ไขข้อมูลประชากรตามกฎหมาย' : '📋 บันทึกรายงานคนเข้าเมือง ร.ร. 3 / ตม. 30';
  
  if (id) {
    google.script.run
      .withSuccessHandler(function(list) {
        var g = list.filter(function(x) { return x.ID === id; })[0];
        renderLegalForm(g, title, id);
      })
      .withFailureHandler(handleError)
      .ดึงผู้เข้าพักตามกฎหมาย(STATE.token);

      RoomNumber: roomNo || '',
      GuestNameTH: guestName || '',
      GuestNameEN: '',
      Nationality: 'ไทย',
      IDCardNo: '',
      PassportNo: '',
      BirthDate: '',
      Gender: 'M',
      Address: '',
      CheckIn: today,
      CheckOut: today
    };
    renderLegalForm(dummyGuest, title, null);
  }
}

// ===== FINANCIAL DOCUMENTS =====
function renderFinancialDocs() {
  google.script.run
    .withSuccessHandler(function(docs) {
      var docTypes = { receipt: 'ใบเสร็จรับเงิน (Receipt)', tax_invoice: 'ใบกำกับภาษี (Tax Invoice)', invoice: 'ใบแจ้งหนี้ (Invoice)', quotation: 'ใบเสนอราคา (Quotation)' };
      var statusLabel = { issued: 'ออกแล้ว', voided: 'ยกเลิกแล้ว' };
      
      var rows = docs.map(function(d) {
        var sc = d.Status === 'issued' ? 'badge-available' : 'badge-oor';
        
        var cust = {};
        try { cust = JSON.parse(d.CustomerSnapshotJSON || '{}'); } catch(e) {}
        var custText = (cust.name || '-') + (cust.phone ? '<br><small>📞 ' + cust.phone + '</small>' : '');
        
        var actions = '';
        if (d.Status === 'issued') {
          if (d.PDFUrl) {
            actions += '<a class="btn btn-sm btn-ghost" href="' + d.PDFUrl + '" target="_blank">📄 เปิด PDF</a> ';
          }
          actions += '<button class="btn btn-sm" style="background:var(--danger);padding:0.25rem 0.5rem;font-size:0.75rem" onclick="voidFinancialDoc(\'' + d.DocID + '\')">❌ ยกเลิก</button>';
        } else {
          actions += '<span style="font-size:0.75rem;color:var(--danger)">เหตุผล: ' + (d.VoidedReason || '-') + '</span>';
        }
        
        return '<tr>' +
          '<td><strong>' + d.DocNo + '</strong></td>' +
          '<td>' + (docTypes[d.DocType] || d.DocType) + '</td>' +
          '<td>' + (d.BookingID || '-') + '</td>' +
          '<td>' + custText + '</td>' +
          '<td>' + fmtMoney(d.Subtotal) + ' ฿</td>' +
          '<td>' + fmtMoney(d.VatAmount) + ' ฿</td>' +
          '<td><strong>' + fmtMoney(d.Total) + ' ฿</strong></td>' +
          '<td><span class="badge ' + sc + '">' + (statusLabel[d.Status]||d.Status) + '</span></td>' +
          '<td>' + (d.IssuedAt ? d.IssuedAt.slice(0,10) + ' ' + d.IssuedAt.slice(11,16) : '') + '</td>' +
          '<td>' + actions + '</td>' +
        '</tr>';
      }).join('');
      
      document.getElementById('page-content').innerHTML =
        '<h1 class="page-title">🧾 ระบบเอกสารทางการเงิน (บัญชีและการเงิน)</h1>' +
        '<div style="margin-bottom:1rem"><button class="btn btn-primary" onclick="showDirectIssueModal()">➕ ออกเอกสารโดยตรง (ไม่ระบุจอง)</button></div>' +
        '<div class="card"><table><thead><tr>' +
          '<th>เลขที่เอกสาร</th><th>ประเภท</th><th>Booking ID</th><th>ลูกค้า</th><th>ก่อน VAT</th><th>VAT 7%</th><th>ยอดรวมทั้งสิ้น</th><th>สถานะ</th><th>วันที่ออก</th><th>ดำเนินการ</th>' +
        '</tr></thead><tbody>' + 
          (rows || '<tr><td colspan="10" style="text-align:center;color:var(--text-muted)">ยังไม่มีการออกเอกสารทางการเงิน</td></tr>') + 
        '</tbody></table></div>';
    })
    .withFailureHandler(handleError)
    .ดึงเอกสารการเงินทั้งหมด(STATE.token);
}

function issueFinancialDoc(bookingId) {

      closeModal();
      loadPage('financial_docs');
      alert('✅ ออกเอกสารเรียบร้อย เลขที่: ' + res.docNo + (res.pdfUrl ? '\nสร้าง PDF เรียบร้อยแล้ว' : ''));
    })
    .withFailureHandler(function(e) { alert('❌ ' + e.message); })
    .ออกเอกสารการเงิน(STATE.token, type, bookingId);
}

function voidFinancialDoc(docId) {
  var reason = prompt('ระบุเหตุผลในการยกเลิกเอกสารนี้:');
  if (!reason) return;
  google.script.run
    .withSuccessHandler(function() {
      if (STATE.currentPage === 'financial_docs') renderFinancialDocs();
      else loadPage(STATE.currentPage);
      alert('✅ ยกเลิกเอกสารเรียบร้อย');
    })
    .withFailureHandler(function(e) { alert('❌ ' + e.message); })
    .ยกเลิกเอกสารการเงิน(STATE.token, docId, reason);
}

function calcDirectTotals() {
  var price = parseFloat(document.getElementById('di-item-price').value) || 0;
  var qty = parseInt(document.getElementById('di-item-qty').value) || 1;
  document.getElementById('di-total-label').textContent = fmtMoney(price * qty);
}

function submitDirectDoc() {
  var price = parseFloat(document.getElementById('di-item-price').value) || 0;
  var qty = parseInt(document.getElementById('di-item-qty').value) || 1;
  var total = price * qty;
  var subtotal = total / 1.07;
  var vatAmount = total - subtotal;
  
  var data = {
    docType: document.getElementById('di-doc-type').value,
    customerType: 'person',
    customerSnapshot: {
      name: document.getElementById('di-cust-name').value.trim(),
      phone: document.getElementById('di-cust-phone').value.trim(),
      idCard: document.getElementById('di-cust-tax').value.trim()
    },
    items: [{
      name: document.getElementById('di-item-name').value.trim() || 'บริการทั่วไป',
      price: price,
      qty: qty,
      amount: total
    }],
    subtotal: subtotal.toFixed(2),
    vatAmount: vatAmount.toFixed(2),
    total: total.toFixed(2)
  };
  
  if (!data.customerSnapshot.name) return alert('กรุณากรอกชื่อลูกค้า');
  
  google.script.run
    .withSuccessHandler(function(res) {
      closeModal();
      renderFinancialDocs();
      alert('✅ ออกเอกสารทางการเงินโดยตรงเรียบร้อย เลขที่: ' + res.docNo);
    })
    .withFailureHandler(function(e) { alert('❌ ' + e.message); })
    .สร้างเอกสารการเงินโดยตรง(STATE.token, data);
}

function switchSettingsTab(tabName) {
  STATE_SETTINGS.currentSubTab = tabName;
  document.querySelectorAll('.sub-tab').forEach(function(el) {
    el.classList.toggle('active', el.dataset.subtab === tabName);
  });
  
  var container = document.getElementById('settings-tab-content');
  container.innerHTML = '<div class="loading-spinner">⏳ กำลังโหลดการตั้งค่า...</div>';
  
  if (tabName === 'property') loadPropertySettings();
  else if (tabName === 'rooms') loadRoomsSettings();
  else if (tabName === 'rates') loadRatesSettings();
  else if (tabName === 'coupons') loadCouponsSettings();
  else if (tabName === 'staff') loadStaffSettings();
}

// Sub-tab 1: Property Settings
function loadPropertySettings() {
  google.script.run
    .withSuccessHandler(function(prop) {
      google.script.run
        .withSuccessHandler(function(config) {
          var container = document.getElementById('settings-tab-content');
          container.innerHTML =

function renderRoomsSettingsUI(rooms, types, buildings, floors) {
  var container = document.getElementById('settings-tab-content');
  
  // 1. Buildings table
  var bRows = buildings.map(function(b) {
    return '<tr>' +

      '<td>' + b.Name + '</td>' +
      '<td>' + b.TotalFloors + ' ชั้น</td>' +
      '<td>' + (b.Description || '-') + '</td>' +
      '<td>' +
        '<button class="btn btn-sm btn-ghost" onclick="editBuildingForm(\'' + b.BuildingID + '\',\'' + b.Name + '\',' + b.TotalFloors + ',\'' + (b.Description || '') + '\')">📝</button> ' +
        '<button class="btn btn-sm btn-danger" onclick="deleteBuilding(\'' + b.BuildingID + '\')">🗑️</button>' +
      '</td>' +
    '</tr>';
  }).join('');
  
  // 1.5. Floors table
  var bldMap = {};
  buildings.forEach(function(b) { bldMap[b.BuildingID] = b; });

      '<td>ชั้นที่ ' + f.FloorNumber + '</td>' +

        '<button class="btn btn-sm btn-ghost" onclick="editFloorForm(\'' + f.FloorID + '\',\'' + f.BuildingID + '\',' + f.FloorNumber + ')">📝</button> ' +
        '<button class="btn btn-sm btn-danger" onclick="deleteFloor(\'' + f.FloorID + '\')">🗑️</button>' +
      '</td>' +
    '</tr>';
  }).join('');
  
  // 2. Room Types table
  var rtRows = types.map(function(t) {
    return '<tr>' +
      '<td><strong>' + t.RoomTypeID + '</strong></td>' +
      '<td>' + t.Name + '</td>' +

      '<td>ผู้ใหญ่: ' + t.MaxAdult + ' / เด็ก: ' + t.MaxChild + '</td>' +
      '<td>' + (t.BedType || '-') + ' (' + t.SizeSqm + ' ตร.ม.)</td>' +
      '<td>' +

        '<button class="btn btn-sm btn-danger" onclick="deleteRoomType(\'' + t.RoomTypeID + '\')">🗑️</button>' +
      '</td>' +
    '</tr>';
  }).join('');

  // 3. Rooms table
  var rRows = rooms.map(function(r) {
    var typeText = r.roomTypeName || '-';
    var statusText = {available:'ว่าง',occupied:'มีผู้เข้าพัก',dirty:'รอทำความสะอาด',clean_inspected:'ตรวจแล้ว',out_of_order:'ปิดซ่อม'}[r.status]||r.status;
    return '<tr>' +
      '<td><strong>' + r.roomNo + '</strong></td>' +
      '<td>' + (r.buildingName || '-') + ' (ชั้น ' + (r.floorNumber || '-') + ')</td>' +
      '<td>' + typeText + '</td>' +
      '<td><span class="badge badge-' + (r.status==='clean_inspected'?'available':r.status==='out_of_order'?'oor':r.status) + '">' + statusText + '</span></td>' +
      '<td>' + (r.note || '-') + '</td>' +
      '<td>' +
        '<button class="btn btn-sm btn-ghost" onclick="editRoomForm(\'' + r.roomId + '\',\'' + r.roomNo + '\',\'' + r.status + '\',\'' + (r.note || '') + '\')">📝</button> ' +
        '<button class="btn btn-sm btn-danger" onclick="deleteRoom(\'' + r.roomId + '\')">🗑️</button>' +
      '</td>' +
    '</tr>';
  }).join('');

  container.innerHTML =
    '<div class="card" style="margin-bottom:1.5rem">' +
      '<div style="display:flex;justify-content:space-between;margin-bottom:1rem"><h3>🏢 จัดการอาคารและโครงสร้างตึก</h3><button class="btn btn-primary" onclick="showBuildingModalForm()">➕ เพิ่มอาคาร</button></div>' +

        (bRows || '<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">ยังไม่มีข้อมูลอาคาร</td></tr>') +
      '</tbody></table>' +
    '</div>' +
    '<div class="card" style="margin-bottom:1.5rem">' +
      '<div style="display:flex;justify-content:space-between;margin-bottom:1rem"><h3>🏢 จัดการชั้นในอาคาร (Floors)</h3><button class="btn btn-primary" onclick="showFloorModalForm()">➕ เพิ่มชั้นใหม่</button></div>' +
      '<table><thead><tr><th>ID</th><th>ชื่ออาคาร</th><th>หมายเลขชั้น</th><th>ดำเนินการ</th></tr></thead><tbody>' +
        (fRows || '<tr><td colspan="4" style="text-align:center;color:var(--text-muted)">ยังไม่มีข้อมูลชั้น</td></tr>') +
      '</tbody></table>' +
    '</div>' +
    '<div class="card" style="margin-bottom:1.5rem">' +
      '<div style="display:flex;justify-content:space-between;margin-bottom:1rem"><h3>🛏️ จัดการประเภทห้องพัก (Room Types)</h3><button class="btn btn-primary" onclick="showRoomTypeModalForm()">➕ เพิ่มประเภทห้อง</button></div>' +
      '<table><thead><tr><th>ID</th><th>ประเภทห้อง</th><th>ราคา (รายวัน/รายเดือน)</th><th>ความจุ</th><th>เตียง/ขนาด</th><th>ดำเนินการ</th></tr></thead><tbody>' +
        (rtRows || '<tr><td colspan="6" style="text-align:center;color:var(--text-muted)">ยังไม่มีประเภทห้องพัก</td></tr>') +
      '</tbody></table>' +

    '<div class="card">' +
      '<div style="display:flex;justify-content:space-between;margin-bottom:1rem"><h3>🏨 จัดการหมายเลขห้องพัก (Rooms)</h3><button class="btn btn-primary" onclick="showRoomModalForm()">➕ เพิ่มห้องพักใหม่</button></div>' +

    '</div>';
}

function renderRatesSettingsUI(seasons, rates, types) {

  var sRows = seasons.map(function(s) {
    var from = s.StartDate ? s.StartDate.toString().slice(0, 10) : '-';

    return '<tr>' +
      '<td><strong>' + s.Name + '</strong></td>' +
      '<td>' + from + '</td>' +
      '<td>' + to + '</td>' +
      '<td>' + (s.Priority || 0) + '</td>' +
      '<td>' +

      '<td>' +
        '<button class="btn btn-sm btn-ghost" onclick="editSeasonRateForm(\'' + r.SeasonRateID + '\',\'' + r.SeasonID + '\',\'' + r.RoomTypeID + '\',' + (r.PriceDaily||0) + ',' + (r.PriceMonthly||0) + ')">📝</button> ' +
        '<button class="btn btn-sm btn-danger" onclick="deleteSeasonRate(\'' + r.SeasonRateID + '\')">🗑️</button>' +
      '</td>' +
    '</tr>';
  }).join('');

  container.innerHTML =
    '<div class="card" style="margin-bottom:1.5rem">' +
      '<div style="display:flex;justify-content:space-between;margin-bottom:1rem"><h3>📅 จัดการช่วงซีซั่นท่องเที่ยว (Seasons)</h3><button class="btn btn-primary" onclick="showSeasonModalForm()">➕ เพิ่มซีซั่น</button></div>' +

      '</tbody></table>' +

      '<div style="display:flex;justify-content:space-between;margin-bottom:1rem"><h3>💰 ผูกราคาพิเศษตามซีซั่น (Season Rates)</h3><button class="btn btn-primary" onclick="showSeasonRateModalForm()">➕ เพิ่มเรทราคา</button></div>' +

    DiscountType: document.getElementById('cup-type').value,
    Value: parseFloat(document.getElementById('cup-value').value) || 0,
    ValidFrom: document.getElementById('cup-from').value,
    ValidTo: document.getElementById('cup-to').value,
    UsageLimit: parseInt(document.getElementById('cup-limit').value) || 100,
    MinNights: parseInt(document.getElementById('cup-min').value) || 0,
    UsedCount: parseInt(document.getElementById('cup-used').value) || 0
  };
  if (!data.Code || !data.ValidFrom || !data.ValidTo) return alert('กรุณากรอกข้อมูลให้ครบถ้วน');
  google.script.run
    .withSuccessHandler(function() { closeModal(); loadCouponsSettings(); })
    .withFailureHandler(function(e) { alert('❌ ' + e.message); })
    .บันทึกคูปอง(STATE.token, data);
}
function deleteCoupon(id) {
  if (!confirm('ต้องการลบคูปอง ID: ' + id + '?')) return;

    .withSuccessHandler(function() { loadCouponsSettings(); })

// Sub-tab 5: Staff settings
function loadStaffSettings() {
  google.script.run
    .withSuccessHandler(function(staff) {
      var rows = staff.map(function(s) {
        var roleMap = { SuperAdmin: 'ผู้ดูแลสูงสุด', PropertyManager: 'ผู้จัดการสาขา', FrontDesk: 'เจ้าหน้าที่ต้อนรับ', Accounting: 'เจ้าหน้าที่บัญชี', Owner: 'เจ้าของกิจการ' };
        var statusLabel = s.status === 'active' ? ' badge-available' : ' badge-oor';
        var statusText = s.status === 'active' ? 'ปกติ' : 'ระงับการใช้งาน';
        
        return '<tr>' +
          '<td><strong>' + s.username + '</strong></td>' +
          '<td>' + s.fullName + '</td>' +
          '<td>' + (roleMap[s.role] || s.role) + '</td>' +
          '<td>' + (s.phone || '-') + '</td>' +
          '<td><span class="badge ' + statusLabel + '">' + statusText + '</span></td>' +
          '<td>' +
            '<button class="btn btn-sm btn-ghost" onclick="editStaffForm(\'' + s.userId + '\',\'' + s.username + '\',\'' + s.fullName + '\',\'' + s.role + '\',\'' + (s.phone || '') + '\',\'' + (s.email || '') + '\',\'' + s.status + '\')">📝 แก้ไข</button> ' +
            (s.username !== 'admin' ? '<button class="btn btn-sm" style="background:var(--danger)" onclick="deleteStaff(\'' + s.userId + '\')">🗑️</button>' : '') +
          '</td>' +
        '</tr>';
      }).join('');

      document.getElementById('settings-tab-content').innerHTML =
        '<div class="card">' +
          '<div style="display:flex;justify-content:space-between;margin-bottom:1rem"><h3>👥 รายชื่อพนักงานและสิทธิ์การเข้าถึง</h3><button class="btn btn-primary" onclick="showStaffModalForm()">➕ เพิ่มพนักงานใหม่</button></div>' +
          '<table><thead><tr><th>Username</th><th>ชื่อ-นามสกุล</th><th>บทบาทสิทธิ์ (Role)</th><th>เบอร์โทร</th><th>สถานะบัญชี</th><th>ดำเนินการ</th></tr></thead><tbody>' +
            rows +
          '</tbody></table>' +
        '</div>';
    })
    .withFailureHandler(handleError)
    .ดึงพนักงานทั้งหมด(STATE.token);
}

function showStaffModalForm(id, name, full, role, phone, email, status) {
  var modal = document.getElementById('modal');
  var body = document.getElementById('modal-body');
  modal.style.display = 'flex';
  body.innerHTML =
    '<h2 style="margin-bottom:1.5rem">' + (id ? '📝 แก้ไขสิทธิ์บัญชีผู้ใช้' : '➕ เพิ่มบัญชีพนักงานใหม่') + '</h2>' +
    '<input type="hidden" id="usr-id" value="' + (id || '') + '">' +
    '<div class="form-group"><label class="form-label">ชื่อล็อกอิน (Username)</label><input id="usr-name" class="form-input" value="' + (name || '') + '" placeholder="เช่น receptionist_01" ' + (name === 'admin' ? 'readOnly' : '') + '></div>' +
    '<div class="form-group"><label class="form-label">รหัสผ่าน ' + (id ? '(กรอกเฉพาะเมื่อต้องการตั้งรหัสใหม่)' : '') + '</label><input id="usr-pass" class="form-input" type="password" placeholder="รหัสผ่านเข้าสู่ระบบ"></div>' +
    '<div class="form-group"><label class="form-label">ชื่อผู้ใช้งานจริง (Full Name)</label><input id="usr-fullname" class="form-input" value="' + (full || '') + '" placeholder="เช่น นายประจักษ์ ใจดี"></div>' +
    '<div class="form-group">' +
      '<label class="form-label">บทบาทสิทธิ์ (Role)</label>' +
      '<select id="usr-role" class="form-select">' +
        '<option value="FrontDesk" ' + (role==='FrontDesk'?'selected':'') + '>FrontDesk (พนักงานต้อนรับ)</option>' +
        '<option value="PropertyManager" ' + (role==='PropertyManager'?'selected':'') + '>PropertyManager (ผู้จัดการ)</option>' +
        '<option value="Accounting" ' + (role==='Accounting'?'selected':'') + '>Accounting (ฝ่ายบัญชีและการเงิน)</option>' +
        '<option value="Owner" ' + (role==='Owner'?'selected':'') + '>Owner (เจ้าของโรงแรม)</option>' +
        '<option value="SuperAdmin" ' + (role==='SuperAdmin'?'selected':'') + '>SuperAdmin (สิทธิ์ดูแลสูงสุด)</option>' +
      '</select>' +
    '</div>' +
    '<div style="display:flex;gap:0.5rem" class="form-group">' +
      '<div style="flex:1"><label class="form-label">เบอร์โทรศัพท์</label><input id="usr-phone" class="form-input" value="' + (phone || '') + '"></div>' +
      '<div style="flex:1"><label class="form-label">อีเมล</label><input id="usr-email" class="form-input" value="' + (email || '') + '"></div>' +
    '</div>' +
    '<div class="form-group">' +
      '<label class="form-label">สถานะการทำงาน</label>' +
      '<select id="usr-status" class="form-select" ' + (name === 'admin' ? 'disabled' : '') + '>' +
        '<option value="active" ' + (status==='active'?'selected':'') + '>ใช้งานปกติ (Active)</option>' +
        '<option value="disabled" ' + (status==='disabled'?'selected':'') + '>ระงับการทำงาน (Disabled)</option>' +
      '</select>' +
    '</div>' +
    '<div style="display:flex;gap:1rem;margin-top:1.5rem">' +
      '<button class="btn btn-primary" style="flex:1" onclick="submitStaff()">✅ บันทึกสิทธิ์พนักงาน</button>' +
      '<button class="btn" style="flex:1;background:var(--surface-2)" onclick="closeModal()">ยกเลิก</button>' +
    '</div>';
}
function editStaffForm(id, name, full, role, phone, email, status) { showStaffModalForm(id, name, full, role, phone, email, status); }
function submitStaff() {
  var data = {
    userId: document.getElementById('usr-id').value,
    username: document.getElementById('usr-name').value.trim(),
    password: document.getElementById('usr-pass').value,
    fullName: document.getElementById('usr-fullname').value.trim(),
    role: document.getElementById('usr-role').value,
    phone: document.getElementById('usr-phone').value.trim(),
    email: document.getElementById('usr-email').value.trim(),
    status: document.getElementById('usr-status').value
  };
  if (!data.username || !data.fullName) return alert('กรุณากรอกชื่อล็อกอินและชื่อจริง');
  if (!data.userId && !data.password) return alert('กรุณาระบุรหัสสำหรับพนักงานใหม่');
  google.script.run
    .withSuccessHandler(function() { closeModal(); loadStaffSettings(); })
    .withFailureHandler(function(e) { alert('❌ ' + e.message); })
    .บันทึกพนักงาน(STATE.token, data);
}
function deleteStaff(id) {
  if (!confirm('ยืนยันลบพนักงานรายนี้ออกจากระบบ?')) return;
  google.script.run
    .withSuccessHandler(function() { loadStaffSettings(); })
    .withFailureHandler(handleError)
    .ลบพนักงาน(STATE.token, id);
}

// ===== MODAL =====
function closeModal() { document.getElementById('modal').style.display = 'none'; }
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

// ===== HELPERS =====
function handleError(e) {
  console.error(e);
  document.getElementById('page-content').innerHTML =
    '<div class="alert alert-error">❌ เกิดข้อผิดพลาด: ' + (e.message||e) + '</div>';
}
function showPage(id) { document.getElementById(id).style.display='flex'; }
function hidePage(id) { document.getElementById(id).style.display='none'; }
function fmtMoney(n) { return (parseFloat(n)||0).toLocaleString('th-TH',{minimumFractionDigits:0}); }
